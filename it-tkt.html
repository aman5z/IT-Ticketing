<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IT Ticket System</title>

<style>

/* ===== SAFE BLOGGER RESET ===== */
body, .post, .post-body, .content, .main-inner {
  margin:0 !important;
  padding:0 !important;
}

/* ===== LIGHT THEME ===== */
:root{
  --bg:#f5f7ff;
  --text:#111;
  --card:#ffffff;
  --primary:#4f46e5;
  --primary-dark:#4338ca;
  --danger:#ef4444;
  --border:#e5e7eb;
  --table-head:#f3f4f6;
  --row-hover:#f9fafb;
}

/* ===== DARK THEME ===== */
body.dark{
  --bg:#0f172a;
  --text:#ffffff;
  --card:#1e293b;
  --primary:#3b82f6;
  --primary-dark:#2563eb;
  --danger:#ef4444;
  --border:#334155;
  --table-head:#334155;
  --row-hover:#1f2937;
}

/* ===== GLOBAL ===== */
body{
  background:var(--bg);
  color:var(--text);
  font-family:Arial, sans-serif;
  transition:0.3s;
}

/* ===== THEME BUTTON ===== */
.theme-toggle{
  position:fixed;
  top:20px;
  right:20px;
  background:var(--card);
  border:1px solid var(--border);
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
  z-index:999;
}

/* ===== CONTAINER ===== */
.container{
  max-width:1100px;
  margin:40px auto;
  padding:20px;
}

/* ===== CARD ===== */
.card{
  background:var(--card);
  padding:25px;
  border-radius:10px;
  box-shadow:0 4px 15px rgba(0,0,0,0.08);
  margin-bottom:30px;
  border:1px solid var(--border);
}

/* ===== LOGIN BOX ===== */
#loginBox{
  max-width:350px;
  margin:60px auto;
}

/* ===== HEADINGS ===== */
h2,h3,h4{
  text-align:center;
  margin-bottom:20px;
}

/* ===== INPUTS ===== */
input, textarea, select{
  width:100%;
  padding:8px;
  margin:8px 0;
  border-radius:5px;
  border:1px solid var(--border);
  box-sizing:border-box;
  background:var(--card);
  color:var(--text);
}

/* ===== BUTTONS ===== */
button{
  padding:10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  background:var(--primary);
  color:white;
  transition:0.3s;
}

button:hover{
  background:var(--primary-dark);
}

.logout-btn{
  background:var(--danger);
  padding:4px 10px !important;
  font-size:15px !important;
  line-height:1 !important;
  height:auto !important;
  width:auto !important;
  margin:0 !important;
}


/* ===== HIDDEN ===== */
.hidden{display:none}

/* ===== STATS ===== */
.stats{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.stat-box{
  flex:1;
  min-width:180px;
  background:var(--card);
  padding:20px;
  border-radius:8px;
  text-align:center;
  border:1px solid var(--border);
}

.stat-box h3{
  margin:0;
  font-size:28px;
  color:var(--primary);
}

/* ===== TABLE ===== */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid var(--border);
}

th{
  background:var(--table-head);
  text-align:left;
}

tr:hover{
  background:var(--row-hover);
}

.status-open{
  color:#facc15;
  font-weight:bold;
}

.status-closed{
  color:#22c55e;
  font-weight:bold;
}

pre{
  color:#ef4444;
}

.overdue{
  color:#ef4444;
  font-weight:bold;
}

</style></head>

<body>

<button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙</button>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>IT Ticket System</h3>

<form onsubmit="handleLogin(event)">
<input id="email" placeholder="Email" required>
<input id="password" type="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

<pre id="loginResult"></pre>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;">
<h3>Dashboard</h3>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="stats">
<div class="stat-box">
<h3 id="totalCount">0</h3>
<p>Total</p>
</div>
<div class="stat-box">
<h3 id="openCount">0</h3>
<p>Open</p>
</div>
<div class="stat-box">
<h3 id="closedCount">0</h3>
<p>Closed</p>
</div>
<div class="stat-box">
<h3 id="overdueCount">0</h3>
<p>Overdue</p>
</div>
</div>
</div>

<div class="card">
<h4>Create Ticket</h4>
<input id="title" placeholder="Title">
<textarea id="description" placeholder="Description"></textarea>
<select id="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
<input type="file" id="attachment">
<button onclick="createTicket()">Create</button>
</div>

<div class="card">
<h4>Search</h4>
<input id="searchBox" placeholder="Search tickets..." oninput="loadTickets()">
</div>

<div class="card">
<h4>All Tickets</h4>
<table id="ticketTable"></table>
</div>

</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxhmHmuh0Z-YT9nWHwMK4vde0xbnpFUUQs22pOQ52TDZoqeSo0m4Abz7-3BDCghg06E/exec";

let token=localStorage.getItem("token");
let userRole="";
let userEmail="";

if(token) showDashboard();

/* ===== THEME ===== */
function toggleTheme(){
document.body.classList.toggle("dark");
const dark=document.body.classList.contains("dark");
themeBtn.textContent=dark?"☀️":"🌙";
localStorage.setItem("theme",dark?"dark":"light");
}

window.onload=function(){
if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark");
themeBtn.textContent="☀️";
}
};

/* ===== LOGIN ===== */
function handleLogin(e){
e.preventDefault();
login();
}

function login(){
fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"login",
email:email.value,
password:password.value
})
})
.then(r=>r.json())
.then(data=>{
token=data.token;
userRole=data.role;
userEmail=email.value;
localStorage.setItem("token",token);
showDashboard();
})
.catch(()=>loginResult.textContent="Login failed");
}

function showDashboard(){
loginBox.classList.add("hidden");
dashboard.classList.remove("hidden");
loadTickets();
}

function logout(){
localStorage.clear();
location.reload();
}

/* ===== CREATE TICKET ===== */
async function createTicket(){

let fileBase64="";
const file=document.getElementById("attachment").files[0];

if(file){
fileBase64=await toBase64(file);
}

fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"createTicket",
token:token,
title:title.value,
description:description.value,
priority:priority.value,
attachment:fileBase64
})
})
.then(()=>{
title.value="";
description.value="";
attachment.value="";
loadTickets();
});
}

function toBase64(file){
return new Promise((resolve)=>{
const reader=new FileReader();
reader.onload=()=>resolve(reader.result.split(",")[1]);
reader.readAsDataURL(file);
});
}

/* ===== LOAD TICKETS ===== */
function loadTickets(){

fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"getTickets",
token:token
})
})
.then(r=>r.json())
.then(data=>{

let html="<tr><th>ID</th><th>Title</th><th>Status</th><th>Assigned</th><th>SLA</th><th>File</th><th>Action</th></tr>";

let open=0,closed=0,overdue=0,totalVisible=0;

let search=document.getElementById("searchBox").value.toLowerCase();

for(let i=1;i<data.length;i++){

let status=data[i][7];
let assigned=data[i][8];
let titleText=(data[i][4]||"").toLowerCase();

/* ===== SEARCH FILTER ===== */
if(search && !titleText.includes(search)) continue;

/* ===== ROLE FILTER ===== */
if(userRole==="User" && data[i][3]!==userEmail) continue;
if(userRole==="Technician" && assigned!==userEmail && assigned!=="Unassigned") continue;

/* ===== SLA ===== */
let due=new Date(data[i][11]);
let now=new Date();
let remaining=Math.floor((due-now)/1000);

/* ===== COUNTERS ===== */
totalVisible++;

if(status==="Open") open++;
if(status==="Closed") closed++;
if(status==="Open" && remaining<0) overdue++;

/* ===== ATTACHMENT DISPLAY ===== */
let fileCell="—";
if(data[i][12]){
fileCell=`<a href="data:application/octet-stream;base64,${data[i][12]}" download>Download</a>`;
}

html+=`<tr>
<td>${data[i][0]}</td>
<td>${data[i][4]}</td>
<td class="${status==='Open'?'status-open':'status-closed'}">${status}</td>
<td>${assigned||'Unassigned'}</td>
<td class="${remaining<0?'overdue':''}">${formatTime(remaining)}</td>
<td>${fileCell}</td>
<td>
${userRole!=="User" && status==="Open" ? `
<select onchange="assignTicket('${data[i][0]}',this.value)">
<option>Unassigned</option>
<option ${assigned==='tech1@mail.com'?'selected':''}>tech1@mail.com</option>
<option ${assigned==='tech2@mail.com'?'selected':''}>tech2@mail.com</option>
</select>
<button onclick="closeTicket('${data[i][0]}')">Close</button>`:''}
</td>
</tr>`;
}

ticketTable.innerHTML=html;
totalCount.textContent=totalVisible;
openCount.textContent=open;
closedCount.textContent=closed;
overdueCount.textContent=overdue;

});
}

/* ===== ASSIGN ===== */
function assignTicket(id,value){
fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"updateTicket",
token:token,
ticketId:id,
status:"Open",
assignedTo:value
})
})
.then(()=>loadTickets());
}

/* ===== CLOSE ===== */
function closeTicket(id){
fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"updateTicket",
token:token,
ticketId:id,
status:"Closed",
assignedTo:userEmail
})
})
.then(()=>loadTickets());
}

/* ===== FORMAT SLA ===== */
function formatTime(sec){
if(sec<=0) return "Overdue";
let h=Math.floor(sec/3600);
let m=Math.floor((sec%3600)/60);
return h+"h "+m+"m";
}

/* ===== AUTO REFRESH ===== */
setInterval(()=>{ if(token) loadTickets(); },60000);

</script>

</body>
</html>
